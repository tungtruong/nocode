name: Build & Deploy

# Manual trigger ONLY for now — automatic-on-push fired retries against the
# server's SSH port and triggered fail2ban. Re-enable `on: push` once the
# deploy step is known-working (or move to a webhook-based deploy that
# doesn't hammer port 22).
on:
  workflow_dispatch:

# Cancel an older in-flight deploy if a newer commit lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # to push to GHCR under the repo owner
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Layer cache lives in the GitHub Actions cache so subsequent builds
      # only re-do the steps after the change. Cuts ~3-4 min off cold builds.
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH to server, pull & restart
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_ENV_CONTENT: ${{ secrets.DEPLOY_ENV }}
          DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          # Forward the env vars above to the remote shell.
          envs: DEPLOY_ENV_CONTENT,DEPLOY_DIR,GH_TOKEN,GH_ACTOR,GH_REPO,GH_SHA
          # appleboy/ssh-action defaults to 5 retries — that's what tripped
          # fail2ban on the first failed run. Fail fast instead.
          timeout: 30s
          command_timeout: 5m
          # Self-bootstrapping deploy. The server only needs:
          #   - SSH access (DEPLOY_HOST/USER/KEY secrets)
          #   - That user has sudo or is root
          # This script handles: install docker, create dirs, write .env from
          # DEPLOY_ENV secret on first run (preserves manual edits afterwards),
          # pull docker-compose.yml from repo, login GHCR, pull image, up.
          script: |
            set -e

            # Bootstrap: install docker + compose plugin if missing.
            if ! command -v docker >/dev/null 2>&1; then
              echo "[bootstrap] Installing Docker..."
              curl -fsSL https://get.docker.com | sh
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "[bootstrap] Installing docker-compose-plugin..."
              apt-get update -qq && apt-get install -y docker-compose-plugin
            fi

            echo "=== Diagnostics ==="
            echo "Host: $(hostname)"
            echo "User: $(whoami)"
            echo "Dir:  $DEPLOY_DIR"
            echo "Docker: $(docker --version)"
            echo "Compose: $(docker compose version)"
            echo "Port 3000 occupied by: $(ss -ltnp 2>/dev/null | awk '$4 ~ /:3000$/ {print $0}' || echo 'free')"
            echo ""

            # Bootstrap: create deploy dir if missing.
            mkdir -p "$DEPLOY_DIR/data" "$DEPLOY_DIR/public/apps"
            cd "$DEPLOY_DIR"

            # Keep docker-compose.yml in sync with whatever the repo ships.
            curl -fsSL -o docker-compose.yml \
              "https://raw.githubusercontent.com/$GH_REPO/$GH_SHA/docker-compose.yml"

            # First-run only: write .env from DEPLOY_ENV secret. After that,
            # preserve whatever's on disk (lets you edit on the server without
            # the next deploy overwriting it).
            if [ ! -f .env ]; then
              if [ -z "$DEPLOY_ENV_CONTENT" ]; then
                echo "❌ .env missing on server AND DEPLOY_ENV secret is empty."
                echo "   Set DEPLOY_ENV secret in repo Settings → Secrets → Actions"
                echo "   (paste the full .env content)."
                exit 1
              fi
              echo "[bootstrap] Writing .env from DEPLOY_ENV secret..."
              printf '%s' "$DEPLOY_ENV_CONTENT" > .env
              chmod 600 .env
            else
              echo "[bootstrap] .env exists, preserving server-local edits."
            fi

            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            docker compose pull
            docker compose up -d
            docker compose ps
            docker image prune -f
