name: Build & Deploy

# Manual trigger ONLY for now — automatic-on-push fired retries against the
# server's SSH port and triggered fail2ban. Re-enable `on: push` once the
# deploy step is known-working (or move to a webhook-based deploy that
# doesn't hammer port 22).
on:
  workflow_dispatch:

# Cancel an older in-flight deploy if a newer commit lands.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # to push to GHCR under the repo owner
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Layer cache lives in the GitHub Actions cache so subsequent builds
      # only re-do the steps after the change. Cuts ~3-4 min off cold builds.
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH to server, pull & restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          # appleboy/ssh-action defaults to 5 retries — that's what tripped
          # fail2ban on the first failed run. Fail fast instead.
          timeout: 30s
          command_timeout: 5m
          # On the server, DEPLOY_DIR holds docker-compose.yml + .env + data/
          # + public/apps/. We:
          #   1. Print diagnostic state up-front (so a failed run's log
          #      tells us why — wrong dir, missing compose, etc.).
          #   2. Make sure the working dir + persistent dirs exist.
          #   3. Pull the docker-compose.yml from the repo so a code change
          #      to it ships without re-bootstrapping the server.
          #   4. Re-login to GHCR (per-step token, expires in an hour).
          #   5. Pull + up + prune.
          script: |
            set -e
            echo "=== Diagnostics ==="
            echo "Host: $(hostname)"
            echo "User: $(whoami)"
            echo "Dir:  ${{ secrets.DEPLOY_DIR }}"
            echo "Docker: $(docker --version 2>&1 || echo 'NOT INSTALLED')"
            echo "Compose: $(docker compose version 2>&1 || echo 'NOT INSTALLED')"
            echo "Port 3000 occupied by: $(ss -ltnp 2>/dev/null | awk '$4 ~ /:3000$/ {print $0}' || echo 'free')"
            echo ""

            cd ${{ secrets.DEPLOY_DIR }} || { echo "DEPLOY_DIR=${{ secrets.DEPLOY_DIR }} does not exist"; exit 1; }

            # Keep docker-compose.yml in sync with whatever the repo ships.
            # Server-local edits in .env are preserved (separate file).
            curl -fsSL -o docker-compose.yml \
              https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/docker-compose.yml

            mkdir -p data public/apps

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            docker compose ps
            docker image prune -f
